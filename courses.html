    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },

    <style>
        body { background-color: #F8FAFC; color: #1E293B; }
        .category-btn { border: 1px solid #CBD5E1; background: white; transition: background 0.2s, color 0.2s; }
        
        .category-btn.active { 
            background-color: #3B82F6; 
            color: white; 
            border-color: #3B82F6; 
        }
        
        .text-gradient { 
            background: linear-gradient(to right, #3B82F6, #FF4B6A); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .course-card { 
            position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.6); 
            transition: all 0.3s ease; height: 100%; display: flex; flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);

        .course-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        
        .watermark-icon {
            position: absolute; right: -40px; bottom: -40px; font-size: 280px;
            opacity: 0.04; transform: rotate(-15deg); pointer-events: none; z-index: 0;
            color: #000;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3B82F6; border-radius: 10px; }
        .animate-fadeIn { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>

        function renderGrid(data) {
            const grid = document.getElementById('courseGrid');
            const noData = document.getElementById('noData');
            grid.innerHTML = '';
            
            if(data.length === 0) {
                noData.classList.remove('hidden');
                return;
            }
            noData.classList.add('hidden');

            data.forEach((item, index) => {
                const card = `
                    <div class="course-card rounded-3xl p-5 bg-gradient-to-br ${item.grad} animate-fadeIn shadow-sm border border-white">
                        <i class="fas ${item.icon} watermark-icon"></i>
                        <div class="flex justify-between items-start mb-4 relative z-10">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg bg-white/60 shadow-inner border border-white">
                                <i class="fas ${item.icon} text-slate-800"></i>
                            </div>
                            <div class="bg-black text-white text-[11px] font-black px-3 py-1.5 rounded-lg shadow-lg uppercase tracking-widest">
                                ${item.price}
                            </div>
                        </div>
                        <h3 class="font-bold text-slate-900 text-[14px] leading-tight mb-2 relative z-10 min-h-[42px]">${item.title}</h3>
                        <p class="text-slate-700 text-[10px] leading-relaxed mb-4 flex-grow relative z-10 font-medium line-clamp-2">${item.desc}</p>
                        <div class="flex items-center gap-2 mb-6 relative z-10">
                            <span class="text-[9px] font-black px-2.5 py-1 rounded-md bg-white/80 border border-white text-slate-700 uppercase tracking-widest shadow-sm">
                                <i class="far fa-clock mr-1 text-blue-600"></i> ${item.duration}
                            </span>
                        </div>
                        <button onclick="enroll('${item.title}', '${item.price}')" class="w-full mt-auto py-3 rounded-2xl bg-white border border-slate-200 text-brand-blue font-black text-[10px] uppercase shadow-md active:shadow-none hover:bg-blue-50 transition-all flex items-center justify-center gap-2 relative z-10">
                            <i class="fab fa-whatsapp text-sm text-green-500"></i> Enroll via WhatsApp
                        </button>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', card);
            });
        }

        let currentTab = 'all';
        function changeTab(cat, btn) {
            currentTab = cat;
            document.querySelectorAll('.category-btn').forEach(b => {
                b.classList.remove('active');
            });
            btn.classList.add('active');
            filterContent();
        }

        function filterContent() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = COURSES.filter(c => {
                const matchTab = currentTab === 'all' || c.cat === currentTab;
                const matchSearch = c.title.toLowerCase().includes(query) || c.desc.toLowerCase().includes(query);
                return matchTab && matchSearch;
            });
            renderGrid(filtered);
        }

        function enroll(name, price) {
            const text = `Hello SmartHub Academy! 👋\n\nI'm interested in enrolling for:\n📚 *Course:* ${name}\n💰 *Price:* ${price}\n\nPlease share the batch details and admission process.`;
            window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(text)}`, '_blank');
        }

        window.onload = () => renderGrid(COURSES);
    </script>
